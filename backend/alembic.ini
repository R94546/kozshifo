# Alembic configuration for the KO'Z SHIFO backend.
#
# NOTE: there is intentionally NO sqlalchemy.url here. alembic/env.py pulls the
# URL from the application's pydantic-settings (app.core.config.settings),
# so the same DATABASE_URL env var / backend/.env that drives the app also
# drives migrations (SQLite dev default, Postgres in production).
#
# Run from the backend/ directory, e.g.:
#   .venv/Scripts/alembic.exe upgrade head

[alembic]
# path to migration scripts (relative to this ini file / cwd)
script_location = alembic

# make `app` importable when alembic is invoked from backend/
prepend_sys_path = .

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# max length of the slug portion of generated filenames
truncate_slug_length = 40

# version path separator
version_path_separator = os

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
